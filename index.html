<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>算个der</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1612;
      --bg-secondary: #2d241d;
      --bg-gradient: linear-gradient(160deg, #1a1612 0%, #2d241d 50%, #1f1a15 100%);
      --card-bg: rgba(45, 36, 29, 0.85);
      --card-border: 1px solid rgba(180, 140, 100, 0.15);
      --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      --text-primary: #f5ebe0;
      --text-secondary: #d4c4b0;
      --text-tertiary: #a89880;
      --accent: #c9a66b;
      --accent-glow: rgba(201, 166, 107, 0.4);
      --input-bg: rgba(30, 24, 18, 0.9);
      --input-border: 1px solid rgba(180, 140, 100, 0.25);
      --btn-primary-bg: linear-gradient(135deg, #8b6914 0%, #c9a66b 50%, #8b6914 100%);
      --btn-primary-hover: linear-gradient(135deg, #a67c1a 0%, #d4b378 50%, #a67c1a 100%);
      --btn-secondary-bg: rgba(180, 140, 100, 0.15);
      --btn-secondary-hover: rgba(180, 140, 100, 0.25);
      --divider: linear-gradient(90deg, transparent, rgba(201, 166, 107, 0.3), transparent);
      --loading-mask: rgba(26, 22, 18, 0.95);
    }

    .light-theme {
      --bg-primary: #f8f4ef;
      --bg-secondary: #ebe5db;
      --bg-gradient: linear-gradient(160deg, #f8f4ef 0%, #ebe5db 50%, #f0ebe3 100%);
      --card-bg: rgba(255, 255, 255, 0.8);
      --card-border: 1px solid rgba(139, 105, 20, 0.12);
      --card-shadow: 0 20px 60px rgba(139, 105, 20, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      --text-primary: #2d241d;
      --text-secondary: #4a3f32;
      --text-tertiary: #7a6b58;
      --accent: #8b6914;
      --accent-glow: rgba(139, 105, 20, 0.3);
      --input-bg: rgba(255, 255, 255, 0.9);
      --input-border: 1px solid rgba(139, 105, 20, 0.2);
      --btn-primary-bg: linear-gradient(135deg, #6b5010 0%, #a67c1a 50%, #6b5010 100%);
      --btn-primary-hover: linear-gradient(135deg, #8b6914 0%, #c9a66b 50%, #8b6914 100%);
      --btn-secondary-bg: rgba(139, 105, 20, 0.1);
      --btn-secondary-hover: rgba(139, 105, 20, 0.18);
      --divider: linear-gradient(90deg, transparent, rgba(139, 105, 20, 0.25), transparent);
      --loading-mask: rgba(248, 244, 239, 0.95);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Serif SC", "PingFang SC", "Microsoft YaHei", serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-gradient);
      z-index: -1;
    }

    .light-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .light-orb:nth-child(1) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }

    .light-orb:nth-child(2) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(180, 120, 60, 0.25) 0%, transparent 70%);
      bottom: 20%;
      left: -50px;
      animation-delay: -7s;
    }

    .light-orb:nth-child(3) {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(200, 160, 100, 0.2) 0%, transparent 70%);
      top: 50%;
      right: 10%;
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 30px) scale(1.05); }
    }

    .main-content {
      position: relative;
      z-index: 10;
      padding: 2rem 1rem 4rem;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: var(--card-border);
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    }

    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .main-title {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 50%, var(--text-primary) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

    .btn-primary {
      background: var(--btn-primary-bg);
      background-size: 200% 100%;
      border: none;
      border-radius: 16px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover {
      background-position: 100% 0;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201, 166, 107, 0.3);
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--btn-secondary-bg);
      border: 1px solid rgba(180, 140, 100, 0.2);
      border-radius: 12px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-secondary::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(201, 166, 107, 0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }

    .btn-secondary:hover {
      background: var(--btn-secondary-hover);
      border-color: rgba(180, 140, 100, 0.4);
    }

    .btn-secondary:hover::after {
      width: 200%;
      height: 200%;
    }

    .input-field {
      background: var(--input-bg);
      border: var(--input-border);
      border-radius: 16px;
      color: var(--text-primary);
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .input-field::placeholder {
      color: var(--text-tertiary);
    }

    .divider-line {
      height: 1px;
      background: var(--divider);
      margin: 1rem 0;
    }

    .gua-symbol-display {
      font-size: clamp(3rem, 12vw, 5rem);
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
      line-height: 1;
      transition: all 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes rotateGua {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    .animate-in {
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--loading-mask);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .loading-gua {
      font-size: 4rem;
      color: var(--accent);
      animation: rotateGua 2s linear infinite, pulse 1s ease-in-out infinite;
    }

    .progress-track {
      width: 200px;
      height: 4px;
      background: rgba(201, 166, 107, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 1.5rem;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), #e8d5a8);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .result-card {
      margin-top: 1.5rem;
    }

    .result-card.animate-in {
      animation: scaleIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .advice-item {
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      background: rgba(201, 166, 107, 0.08);
      border-radius: 12px;
      border-left: 3px solid var(--accent);
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-secondary);
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0;
    }

    .conclusion-text {
      font-size: 1.1rem;
      line-height: 1.8;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(201, 166, 107, 0.1) 0%, rgba(201, 166, 107, 0.05) 100%);
      border-radius: 16px;
      border: 1px solid rgba(201, 166, 107, 0.15);
    }

    .insight-block {
      padding: 1rem;
      margin: 0.75rem 0;
      background: rgba(201, 166, 107, 0.06);
      border-radius: 12px;
      border-left: 3px solid var(--accent);
    }

    .insight-block h4 {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .insight-block p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .number-input {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      -moz-appearance: textfield;
    }

    .number-input::-webkit-outer-spin-button,
    .number-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .theme-toggle {
      position: relative;
      width: 50px;
      height: 28px;
      background: var(--btn-secondary-bg);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(180, 140, 100, 0.2);
    }

    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .light-theme .theme-toggle::after {
      transform: translateX(22px);
    }

    @media (max-width: 480px) {
      .main-content {
        padding: 1rem 0.75rem 3rem;
      }
      
      .glass-card {
        padding: 1.25rem;
        border-radius: 20px;
      }

      .btn-primary {
        padding: 1rem;
        font-size: 1rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .action-buttons button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <canvas id="bgCanvas"></canvas>
  <div class="light-orb"></div>
  <div class="light-orb"></div>
  <div class="light-orb"></div>

  <div class="main-content max-w-lg mx-auto">
    <header class="text-center mb-8 animate-in">
      <div class="flex justify-end mb-4">
        <div class="theme-toggle" id="themeToggle" role="button" aria-label="切换主题" tabindex="0"></div>
      </div>
      <h1 class="main-title mb-3">算个der</h1>
      <p class="text-base" style="color: var(--text-tertiary);">小事一卦，大了不算</p>
    </header>

    <div class="glass-card p-6 mb-6 animate-in delay-1">
      <div class="mb-5">
        <label class="block text-sm mb-2" style="color: var(--text-tertiary);">写下你的问题</label>
        <textarea 
          id="question" 
          class="input-field w-full p-4 min-h-[100px] resize-none text-base"
          placeholder="比如：今年有桃花吗？能不能候补到票？事业能升职吗？"
        ></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
          <label class="block text-sm mb-2" style="color: var(--text-tertiary);">数一 (1~8)</label>
          <input 
            id="num1" 
            type="number" 
            min="1" 
            max="8" 
            class="input-field number-input w-full p-3"
            value="6"
          >
        </div>
        <div>
          <label class="block text-sm mb-2" style="color: var(--text-tertiary);">数二 (1~8)</label>
          <input 
            id="num2" 
            type="number" 
            min="1" 
            max="8" 
            class="input-field number-input w-full p-3"
            value="5"
          >
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-5">
        <button onclick="randomNum()" class="btn-secondary py-3 text-sm flex items-center justify-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="8" height="8" rx="1"/>
            <rect x="14" y="2" width="8" height="8" rx="1"/>
            <rect x="2" y="14" width="8" height="8" rx="1"/>
            <rect x="14" y="14" width="8" height="8" rx="1"/>
            <circle cx="6" cy="6" r="1" fill="currentColor"/>
            <circle cx="18" cy="6" r="1" fill="currentColor"/>
            <circle cx="6" cy="18" r="1" fill="currentColor"/>
            <circle cx="18" cy="18" r="1" fill="currentColor"/>
          </svg>
          随机
        </button>
        <button onclick="clearInput()" class="btn-secondary py-3 text-sm flex items-center justify-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/>
          </svg>
          清空
        </button>
      </div>

      <button onclick="derOnce()" class="btn-primary w-full py-4 text-lg">
        der 一下
      </button>
    </div>

    <div id="resultArea" class="hidden"></div>
  </div>

  <div id="loadingMask" class="loading-overlay">
    <div class="loading-gua">☵</div>
    <p class="mt-4 text-lg" style="color: var(--text-secondary);">正在推演卦象...</p>
    <div class="progress-track">
      <div id="progressBar" class="progress-bar"></div>
    </div>
    <p id="progressText" class="mt-3 text-sm" style="color: var(--text-tertiary);">解析卦象结构...</p>
  </div>

  <script>
    // ===================== 背景粒子系统 =====================
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createParticles() {
      particles = [];
      const count = Math.min(50, Math.floor(window.innerWidth / 25));
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.max(1, Math.random() * 3 + 0.5),
          speedX: (Math.random() - 0.5) * 0.3,
          speedY: (Math.random() - 0.5) * 0.3,
          opacity: Math.random() * 0.4 + 0.1,
          hue: Math.random() * 30 + 30
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const isLight = document.body.classList.contains('light-theme');
      
      particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        
        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, Math.max(1, p.size * 3));
        const baseColor = isLight ? `hsla(${p.hue}, 60%, 35%` : `hsla(${p.hue}, 70%, 55%`;
        gradient.addColorStop(0, `${baseColor}, ${p.opacity})`);
        gradient.addColorStop(1, `${baseColor}, 0)`);
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(1, p.size * 3), 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      });
      
      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            const lineOpacity = (1 - dist / 120) * 0.15 * Math.min(p1.opacity, p2.opacity);
            ctx.strokeStyle = isLight 
              ? `rgba(139, 105, 20, ${lineOpacity})` 
              : `rgba(201, 166, 107, ${lineOpacity})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        });
      });
      
      animationId = requestAnimationFrame(drawParticles);
    }

    resizeCanvas();
    createParticles();
    drawParticles();

    window.addEventListener('resize', () => {
      resizeCanvas();
      createParticles();
    });

    // ===================== 核心数据层 =====================
    const GUA_BASE = {
      0: {name: "乾", sym: "☰", ele: "金", nature: "刚健进取"},
      1: {name: "坤", sym: "☷", ele: "土", nature: "包容承载"},
      2: {name: "震", sym: "☳", ele: "木", nature: "动而有力"},
      3: {name: "巽", sym: "☴", ele: "木", nature: "顺而入"},
      4: {name: "坎", sym: "☵", ele: "水", nature: "险而深"},
      5: {name: "离", sym: "☲", ele: "火", nature: "明而散"},
      6: {name: "艮", sym: "☶", ele: "土", nature: "止而静"},
      7: {name: "兑", sym: "☱", ele: "金", nature: "悦而说"}
    };

    const SIXTY_FOUR_GUA = [
      ["乾为天","坤为地","雷天大壮","风天小畜","水天需","火天大有","山天大畜","泽天夬"],
      ["天地否","坤为地","雷地豫","风地观","水地比","火地晋","山地剥","泽地萃"],
      ["天雷无妄","地雷复","震为雷","风雷益","水雷屯","火雷噬嗑","山雷颐","泽雷随"],
      ["天风姤","地风升","雷风恒","巽为风","水风井","火风鼎","山风蛊","泽风大过"],
      ["天水讼","地水师","雷水解","风涣","坎为水","火水未济","山水蒙","泽水困"],
      ["天火同人","地火明夷","雷火丰","风火家人","水火既济","离为火","山火贲","泽火革"],
      ["天山遁","地山谦","雷山小过","风山渐","水山蹇","火山旅","艮为山","泽山咸"],

      const shangIdx = n1 - 1;
      const xiaIdx = n2 - 1;
      const total = n1 + n2;
      const moveYao = total % 6 === 0 ? 6 : total % 6;
      
      const yaoReverse = [1, 0, 3, 2, 5, 4, 7, 6];
      let shangBianIdx = shangIdx;
      let xiaBianIdx = xiaIdx;
      
      if (moveYao <= 3) {

      } else {
        shangBianIdx = yaoReverse[shangIdx];

      const benGuaName = SIXTY_FOUR_GUA[shangIdx][xiaIdx];
      const bianGuaName = SIXTY_FOUR_GUA[shangBianIdx][xiaBianIdx];
      
      return {

        benGuaName: benGuaName,
        bianGuaName: bianGuaName,

    // 获取场景类型
    function getQuestType(questText) {
      for (let type of QUEST_SCENARIO) {
        if (type.reg.test(questText)) return type;
      }
      return QUEST_SCENARIO[QUEST_SCENARIO.length - 1];
    }

    // 【主推演函数】- 七步推演链
    function performDeduction(gua, questType) {
      // 第一步：定性 - 卦象本质
      const essence = GUA_ESSENCE[gua.benGuaName] || { essence: "待定", pattern: "需结合实际情况判断", keyPoint: "关键是审时度势" };
      
      // 第二步：定位 - 动爻阶段
      const yaoStage = YAO_STAGE[gua.moveYao];
      
      // 第三步：力量 - 体用分析
      const tiYongAnalysis = getTiYongAnalysis(gua.ti.ele, gua.yong.ele);
      
      // 第四步：矛盾 - 核心冲突生成
      const conflict = generateCoreConflict(gua.benGuaName, gua.moveYao, tiYongAnalysis);
      
      // 第五步：场景翻译
      const sceneResult = sceneDeduction(questType.type, conflict, tiYongAnalysis, gua.benGuaName);
      
      // 第六步：行为结果
      const behaviorResult = {
        currentStage: `${yaoStage.stage}（${yaoStage.meaning}）`,
        coreConflict: conflict.conflict,
        yourPosition: tiYongAnalysis.power,
        environmentPosition: tiYongAnalysis.dynamic,
        keyAction: yaoStage.action
      };
      
      // 第七步：建议
      const finalAdvice = sceneResult.advice;
      
      return {
        essence,
        yaoStage,
        tiYongAnalysis,
        conflict,
        sceneResult,
        behaviorResult,
        finalAdvice,
        shareText: generateShareText(gua, behaviorResult, sceneResult)
      };
    }

    // 生成分享文本
    function generateShareText(gua, behaviorResult, sceneResult) {
      return `【算个der - 卦象推演】

问：${document.getElementById("question").value}

本卦：${gua.benGuaName} ${gua.benSym}
阶段：${behaviorResult.currentStage}
体用：${behaviorResult.yourPosition}

局面判断：${sceneResult.situation}
根本原因：${sceneResult.realCause}
发展预期：${sceneResult.likelyResult}

 ${behaviorResult.coreConflict}`;
    }

          </div>

    function copyResult() {
      navigator.clipboard.writeText(currentShareText).then(() => {

      }).catch(() => {
        showToast('复制失败，请手动复制');
      });
    }

    function shareResult() {
      if (navigator.share) {
        navigator.share({
          title: '算个der - 卦象推演',
          text: currentShareText
        }).catch(() => copyResult());
      } else {
        copyResult();
      }
    }

    function generateImage() {
      const resultArea = document.getElementById('resultArea');
      html2canvas(resultArea, {
        scale: 2,
        useCORS: true,
        backgroundColor: isLightTheme ? '#f8f4ef' : '#1a1612'
      }).then(canvas => {
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `算个der_${Date.now()}.png`;
        link.click();
        showToast('图片已保存');
      });
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--card-bg);
        color: var(--text-primary);
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 14px;
        z-index: 1000;
        animation: fadeInUp 0.3s ease;
        backdrop-filter: blur(10px);
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // ===================== 加载动画 =====================
    function showLoading() {
      const mask = document.getElementById('loadingMask');
      const bar = document.getElementById('progressBar');
      const text = document.getElementById('progressText');
      
      mask.classList.add('active');
      bar.style.width = '0%';
      
      const texts = ['解析卦象结构...', '推演体用关系...', '定位当前阶段...', '生成核心矛盾...', '翻译场景含义...'];
      let progress = 0;
      let textIdx = 0;
      
      const timer = setInterval(() => {
        progress += 5;
        bar.style.width = progress + '%';
        
        if (progress % 20 === 0 && textIdx < texts.length - 1) {
          textIdx++;
          text.textContent = texts[textIdx];
        }
        
        if (progress >= 100) clearInterval(timer);
      }, 30);
      
      return timer;
    }

    function hideLoading(timer) {
      clearInterval(timer);
      const mask = document.getElementById('loadingMask');
      setTimeout(() => mask.classList.remove('active'), 200);
    }

    // ===================== 主函数 =====================
    function derOnce() {
      const questText = document.getElementById('question').value.trim();
      const num1 = document.getElementById('num1').value;
      const num2 = document.getElementById('num2').value;

      if (!questText) {
        showToast('先写下你想der啥事儿');
        return;
      }
      if (!num1 || !num2 || isNaN(num1) || isNaN(num2) || num1 < 1 || num1 > 8 || num2 < 1 || num2 > 8) {
        showToast('数字得填1~8之间');
        return;
      }

      const timer = showLoading();
      
      setTimeout(() => {
        const gua = calcGua(num1, num2);
        const questType = getQuestType(questText);
        const deduction = performDeduction(gua, questType);
        currentShareText = deduction.shareText;
        
        hideLoading(timer);
        renderResult(gua, deduction);
      }, 1800);
    }
