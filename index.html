    /* Accessibility: screen reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* ========== 颜色变量 ========== */
    :root {
      --bg-primary: #1f1a14;
      --bg-secondary: #2a2218;
      --bg-gradient: linear-gradient(160deg, #241e16 0%, #1f1a14 50%, #1a1510 100%);
      --card-bg: rgba(30, 24, 16, 0.35);
      --card-border: 1px solid rgba(180, 140, 100, 0.08);
      --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      --text-primary: #ece4d8;
      --text-secondary: #a89880;
      --text-tertiary: #6e6050;
      --accent: #c9a66b;
      --accent-glow: rgba(201, 166, 107, 0.3);
      --input-bg: rgba(30, 24, 16, 0.5);
      --input-border: 1px solid rgba(180, 140, 100, 0.18);
      --btn-primary-bg: linear-gradient(135deg, #8b6914 0%, #c9a66b 50%, #8b6914 100%);
      --btn-primary-hover: linear-gradient(135deg, #a67c1a 0%, #d4b378 50%, #a67c1a 100%);
      --btn-secondary-bg: rgba(180, 140, 100, 0.12);
      --btn-secondary-hover: rgba(180, 140, 100, 0.2);
      --divider: linear-gradient(90deg, transparent, rgba(201, 166, 107, 0.15), transparent);
      --loading-mask: rgba(26, 22, 18, 0.95);
      --error: #d04444;
      --success: #3a8;
    }

    /* ========== 页面样式 ========== */
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      background: linear-gradient(180deg, #241e16 0%, #1f1a14 50%, #1a1510 100%);
      color: #e8ddd0;
    }

    /* 噪点纹理已移除 */

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #241e16 0%, #1f1a14 50%, #1a1510 100%);
      z-index: -1;
    }

    .light-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .light-orb:nth-child(1) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }

    .light-orb:nth-child(2) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(180, 120, 60, 0.25) 0%, transparent 70%);
      bottom: 20%;
      left: -50px;
      animation-delay: -7s;
    }

    .light-orb:nth-child(3) {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(200, 160, 100, 0.2) 0%, transparent 70%);
      top: 50%;
      right: 10%;
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 30px) scale(1.05); }
    }

    .main-content {
      position: relative;
      z-index: 10;
      padding: 2rem 1rem 4rem;
    }

    .glass-card {
      background: rgba(26, 20, 14, 0.7);
      border: 1px solid rgba(201, 166, 107, 0.12);
      border-radius: 20px;
      box-shadow: 0 0 0 1px rgba(201, 166, 107, 0.04), 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    .glass-card:hover {
      border-color: rgba(201, 166, 107, 0.2);
    }

    .main-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--text-primary);
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

    main[role="main"] {
      background: rgba(30, 24, 18, 0.4);
      border: 1px solid rgba(201, 166, 107, 0.06);
      border-radius: 20px;
    }

    .btn-primary {
      background: linear-gradient(180deg, #d4a84b 0%, #b8892e 100%);
      border: none;
      border-radius: 12px;
      box-shadow:
        0 6px 18px rgba(201, 166, 107, 0.35),
        0 2px 4px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,246,220,0.4);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(180deg, #ddb25a 0%, #c79a3e 100%);
      transform: translateY(-2px);
      box-shadow:
        0 10px 28px rgba(201, 166, 107, 0.4),
        0 4px 8px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,246,220,0.5);
    }
    .btn-primary:active {
      transform: translateY(0px) scale(0.98);
      background: linear-gradient(180deg, #b8892e 0%, #a37828 100%);
      box-shadow:
        0 3px 10px rgba(201, 166, 107, 0.25),
        0 1px 2px rgba(0,0,0,0.15),
        inset 0 1px 0 rgba(255,246,220,0.2);
    }

    .btn-secondary {
      background: var(--btn-secondary-bg);
      border: 1px solid rgba(180, 140, 100, 0.2);
      border-radius: 12px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201, 166, 107, 0.25);
    }

    .btn-secondary:active {
      transform: translateY(1px) scale(0.98);
    }

    .btn-bounce {
      animation: bounceIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .gua-symbol-display {
      animation: glowPulse 2s ease-in-out infinite;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-secondary::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(201, 166, 107, 0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }

    .btn-secondary:hover {
      background: var(--btn-secondary-hover);
      border-color: rgba(180, 140, 100, 0.4);
    }

    .btn-secondary:hover::after {
      width: 200%;
      height: 200%;
    }

    .input-field {
      background: rgba(24, 18, 12, 0.5);
      border: 1px solid rgba(180, 140, 100, 0.08);
      border-radius: 16px;
      color: var(--text-primary);
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(201, 166, 107, 0.25);
      box-shadow: 0 0 0 2px rgba(201, 166, 107, 0.06);
      transform: translateY(-1px);
    }

    .input-field:focus::placeholder {
      opacity: 0.5;
      transform: translateX(4px);
    }

    .input-field::placeholder {
      color: var(--text-tertiary);
      transition: all 0.3s ease;
    }

    .num-input {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .num-input:focus {
      border-color: rgba(201, 166, 107, 0.25);
      box-shadow: 0 0 0 2px rgba(201, 166, 107, 0.06);
      outline: none;
    }

    .num-input.pop {
      animation: numberPop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Focus visible for keyboard navigation */
    .btn-primary:focus-visible,
    .btn-secondary:focus-visible,
    .input-field:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .divider-line {
      height: 1px;
      background: var(--divider);
      margin: 1rem 0;
    }

    .gua-symbol-display {
      font-size: clamp(3rem, 12vw, 5rem);
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
      line-height: 1;
      transition: all 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes rotateGua {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.3); }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideInLeft {
      0% { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(201, 166, 107, 0.3); }
      50% { box-shadow: 0 0 40px rgba(201, 166, 107, 0.6); }
    }

    @keyframes numberPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--loading-mask);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .loading-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .loading-gua-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-ring {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(201, 166, 107, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-gua {
      font-size: 2.5rem;
      color: var(--accent);
      animation: pulseGua 1.5s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes pulseGua {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }

    .loading-step-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .loading-step-chip {
      font-size: 0.75rem;
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      background: rgba(201, 166, 107, 0.1);
      color: var(--text-tertiary);
      border: 1px solid rgba(201, 166, 107, 0.15);
      transition: all 0.3s ease;
    }

    .loading-step-chip.is-active {
      background: rgba(201, 166, 107, 0.2);
      color: var(--accent);
      border-color: rgba(201, 166, 107, 0.4);
      box-shadow: 0 0 12px rgba(201, 166, 107, 0.25);
    }

    .progress-track {
      width: 200px;
      height: 4px;
      background: rgba(201, 166, 107, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), #e8d5a8);
      border-radius: 2px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(201, 166, 107, 0.4);
    }

    #loadingSubtext {
      transition: opacity 0.2s ease;
    }

    .loading-gua {
      transition: opacity 0.15s ease;
    }

    .chip-sm {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      color: var(--text-tertiary);
      line-height: 1.6;
    }

    .result-card {
      margin-top: 1.5rem;
      background: rgba(26, 22, 16, 0.5);
      border: 1px solid rgba(201, 166, 107, 0.15);
      border-radius: 14px;
      box-shadow: 0 0 12px rgba(201, 166, 107, 0.03), 0 2px 8px rgba(0,0,0,0.15);
      padding: 1.25rem;
    }

    .result-card.animate-in {
      animation: scaleIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .result-card.bounce-in {
      animation: bounceIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .result-card.slide-in {
      animation: slideInLeft 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ===================== Task A5: 结果卡片逐步激活 ===================== */
    .result-step-card {
      opacity: 0.85;
      transition: opacity 0.3s ease;
    }

    .result-step-card.is-active-step {
      opacity: 1;
    }

    .result-step-card.is-inactive-step {
      opacity: 0.85;
    }

    .reasoning-bridge-card {
      position: relative;
    }

    .reasoning-bridge-card strong {
      color: var(--accent);
      font-weight: 600;
    }

    .advice-item {
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      background: rgba(201, 166, 107, 0.08);
      border-radius: 12px;
      border-left: 3px solid var(--accent);
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-secondary);
      animation: floatUp 0.5s ease forwards;
      opacity: 0;
    }

    .advice-item:nth-child(1) { animation-delay: 0.1s; }
    .advice-item:nth-child(2) { animation-delay: 0.2s; }
    .advice-item:nth-child(3) { animation-delay: 0.3s; }
    .advice-item:nth-child(4) { animation-delay: 0.4s; }

    .conclusion-text {
      font-size: 1.1rem;
      line-height: 1.8;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(201, 166, 107, 0.1) 0%, rgba(201, 166, 107, 0.05) 100%);
      border-radius: 16px;
      border: 1px solid rgba(201, 166, 107, 0.15);
    }

    .insight-block {
      padding: 0.75rem 0 0.75rem 1rem;
      margin: 0.5rem 0;
      border-left: 2px solid rgba(201, 166, 107, 0.2);
    }

    .insight-block h4 {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .insight-block p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* 卦理推演层样式 */
    .gua-reasoning-section .result-step-card {
      margin-top: 1rem;
    }

    /* 生克色彩微调 */
    .gua-reasoning-section .insight-block {
      border-left-color: var(--accent);
    }

    .number-input {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      -moz-appearance: textfield;
    }

    .number-input::-webkit-outer-spin-button,
    .number-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    @media (max-width: 480px) {
      .main-content {
        padding: 1rem 0.75rem 3rem;
      }
      
      .glass-card {
        padding: 1.25rem;
        border-radius: 20px;
      }

      .btn-primary {
        padding: 1rem;
        font-size: 1rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .action-buttons button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* High contrast mode support */

    /* ========== 底部导航与面板系统 ========== */

    /* ===== 记录页：竹签陈列 ===== */

    /* 竹签上端弧形 */

    /* ========== 推导区容器（宣纸底 + 八卦暗纹 + 顶部暖光） ========== */
    .reasoning-container {

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });

    let animationId = null;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function createParticles() {
      particles = [];
      const count = Math.min(40, Math.floor(window.innerWidth / 30));
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          size: Math.max(1, Math.random() * 2.5 + 0.5),
          speedX: (Math.random() - 0.5) * 0.25,
          speedY: (Math.random() - 0.5) * 0.25,
          opacity: Math.random() * 0.35 + 0.1,
          hue: Math.random() * 30 + 30
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      const baseColorPrefix = '201, 166, 107';

      // Draw particles
      for (let i = 0, len = particles.length; i < len; i++) {
        const p = particles[i];
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0) p.x = window.innerWidth;
        else if (p.x > window.innerWidth) p.x = 0;
        if (p.y < 0) p.y = window.innerHeight;
        else if (p.y > window.innerHeight) p.y = 0;

        const r = Math.max(1, p.size * 3);
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${baseColorPrefix}, ${p.opacity * 0.6})`;
        ctx.fill();
      }

      // Draw connections (optimized - only check nearby particles)
      ctx.lineWidth = 0.5;
      for (let i = 0, len = particles.length; i < len; i++) {
        const p1 = particles[i];
        for (let j = i + 1; j < len; j++) {
          const p2 = particles[j];
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const distSq = dx * dx + dy * dy;

          if (distSq < 14400) { // 120^2
            const dist = Math.sqrt(distSq);
            const lineOpacity = (1 - dist / 120) * 0.12 * Math.min(p1.opacity, p2.opacity);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(${baseColorPrefix}, ${lineOpacity})`;
            ctx.stroke();
          }
        }
      }

      animationId = requestAnimationFrame(drawParticles);
    }

    function initCanvas() {
      resizeCanvas();
      createParticles();

        { text: "可贞，无咎。", core: "守正不改，便无灾祸。" },
        { text: "无妄之疾，勿药有喜。", core: "无妄的小疾，不必用药自愈。" },
        { text: "无妄，行有眚，无攸利。", core: "不妄为也别妄动，动则有失。" }
      ],
      "风雷益": [
        { text: "利用为大作，元吉，无咎。", core: "借东风干大事，大吉。" },
        { text: "或益之十朋之龟，弗克违，永贞吉。", core: "有贵重助力，恒守正道则吉。" },
        { text: "益之用凶事，无咎。有孚中行，告公用圭。", core: "灾祸中反而受益，诚信通行。" },
        { text: "中行，告公从。利用为依迁国。", core: "持中道而行，为公事迁移。" },
        { text: "有孚惠心，勿问元吉。有孚惠我德。", core: "怀惠爱之心，无需问也是吉。" },
        { text: "莫益之，或击之，立心勿恒，凶。", core: "无人助反被攻，心志不恒则凶。" }
      ],
      "水雷屯": [
        { text: "磐桓，利居贞，利建侯。", core: "原地打转，利于坚守正道，宜开始规划。" },
        { text: "屯如邅如，乘马班如。匪寇婚媾，女子贞不字，十年乃字。", core: "徘徊难进，这阻力其实在为成就你。急不来，需要长周期。" },
        { text: "即鹿无虞，惟入于林中，君子几不如舍，往吝。", core: "追鹿无向导，不如暂时放弃。" },
        { text: "乘马班如，求婚媾，往吉，无不利。", core: "前行虽有徘徊，但去求则吉。" },
        { text: "屯其膏，小贞吉，大贞凶。", core: "恩泽施行范围宜小不宜大。" },
        { text: "乘马班如，泣血涟如。", core: "进退不能，陷入悲伤的困顿。" }
      ],
      "火雷噬嗑": [
        { text: "屦校灭趾，无咎。", core: "戴上脚镣磨破趾，小惩大诫。" },
        { text: "噬肤灭鼻，无咎。", core: "啃硬骨头伤到鼻，虽难无咎。" },
        { text: "噬腊肉，遇毒，小吝，无咎。", core: "啃腊肉遇毒，小麻烦不碍事。" },
        { text: "噬干胏，得金矢，利艰贞，吉。", core: "啃带骨干肉得铜箭头，艰守得吉。" },
        { text: "噬干肉，得黄金，贞厉，无咎。", core: "啃干肉得黄金，虽险终无妨。" },
        { text: "何校灭耳，凶。", core: "重枷遮耳，罪不可赦而凶。" }
      ],
      "山雷颐": [
        { text: "舍尔灵龟，观我朵颐，凶。", core: "放弃自养智慧，垂涎他人口食则凶。" },
        { text: "颠颐，拂经，于丘颐，征凶。", core: "颠倒了养生之道，前行凶险。" },
        { text: "拂颐，贞凶，十年勿用，无攸利。", core: "违背颐养法则，长久无利。" },
        { text: "颠颐，吉，虎视眈眈，其欲逐逐，无咎。", core: "专心一处如虎盯猎物，吉。" },
        { text: "拂经，居贞吉，不可涉大川。", core: "守常规安静休养则吉。" },
        { text: "由颐，厉吉，利涉大川。", core: "顺养之道虽有险，但终吉。" }
      ],
      "泽雷随": [
        { text: "官有渝，贞吉，出门交有功。", core: "变化之际守正吉，出门有收获。" },
        { text: "系小子，失丈夫。", core: "抓了小的却丢了大的。" },
        { text: "系丈夫，失小子。随有求得，利居贞。", core: "抓牢大的舍弃小的，选择正确。" },
        { text: "随有获，贞凶。有孚在道，以明，何咎。", core: "追随得利反凶，守诚信则无咎。" },
        { text: "孚于嘉，吉。", core: "追随善美之事，吉祥。" },
        { text: "拘系之，乃从维之，王用亨于西山。", core: "被牢固捆绑，只能顺服通达。" }
      ],
      "雷风恒": [
        { text: "浚恒，贞凶，无攸利。", core: "过分深求恒定，反受其害。" },
        { text: "悔亡。", core: "悔恨会逐渐消亡。" },
        { text: "不恒其德，或承之羞，贞吝。", core: "不能恒守德行，迟早受辱。" },
        { text: "田无禽。", core: "长久守猎，却无收获。" },
        { text: "恒其德，贞，妇人吉，夫子凶。", core: "固守柔顺之德，女子吉男子凶。" },
        { text: "振恒，凶。", core: "动荡不安于恒道，凶。" }
      ],
      "水风井": [
        { text: "井泥不食，旧井无禽。", core: "井底淤泥不能饮用，废弃之井。" },
        { text: "井谷射鲋，瓮敝漏。", core: "井水漏失，如破罐难存水。" },
        { text: "井渫不食，为我心恻，可用汲，王明，并受其福。", core: "井已淘净却无人饮用，可惜。" },
        { text: "井甃，无咎。", core: "井壁修葺完善，平安无事。" },
        { text: "井冽寒泉食。", core: "井水清冽甘泉，可以饮用。" },
        { text: "井收勿幕，有孚元吉。", core: "井口不盖，众人共享大吉。" }
      ],
      "火风鼎": [
        { text: "鼎颠趾，利出否。得妾以其子，无咎。", core: "鼎脚颠倒，利于清除废物，反得新气象。" },
        { text: "鼎有实，我仇有疾，不我能即，吉。", core: "鼎中有实，对手无法靠近，吉。" },
        { text: "鼎耳革，其行塞，雉膏不食，方雨亏悔，终吉。", core: "鼎耳脱落难移，但雨降后终吉。" },
        { text: "鼎折足，覆公餗，其形渥，凶。", core: "鼎足折断倾覆，不堪重任而凶。" },
        { text: "鼎黄耳金铉，利贞。", core: "黄铜耳配金杠，安稳吉祥。" },
        { text: "鼎玉铉，大吉，无不利。", core: "玉制鼎杠，大吉，一切顺遂。" }
      ],
      "山风蛊": [
        { text: "干父之蛊，有子，考无咎，厉终吉。", core: "匡正父辈积弊，虽有风险终吉。" },
        { text: "干母之蛊，不可贞。", core: "整治母亲留下的积弊，不可硬来。" },
        { text: "干父之蛊，小有悔，无大咎。", core: "改革父辈问题，小有遗憾但无大碍。" },
        { text: "裕父之蛊，往见吝。", core: "纵容父辈积弊，前行将困窘。" },
        { text: "干父之蛊，用誉。", core: "整治积弊得当，获众人赞誉。" },
        { text: "不事王侯，高尚其事。", core: "不侍权贵，专心自己的追求。" }
      ],
      "泽风大过": [
        { text: "藉用白茅，无咎。", core: "用白茅垫底以示慎重，无祸。" },
        { text: "枯杨生稊，老夫得其女妻，无不利。", core: "枯杨生新枝，非常规组合也顺。" },
        { text: "栋桡，凶。", core: "房梁弯曲，大厦将倾，凶。" },
        { text: "栋隆，吉，有它吝。", core: "房梁隆起加固，吉，但需防他变。" },
        { text: "枯杨生华，老妇得其士夫，无咎无誉。", core: "枯杨开花，非常之举无功无过。" },
        { text: "过涉灭顶，凶，无咎。", core: "涉水被淹没顶，凶，但并非有罪。" }
      ],
      "天水讼": [
        { text: "不永所事，小有言，终吉。", core: "不长久纠缠，虽有口舌终吉。" },
        { text: "不克讼，归而逋，其邑人三百户，无眚。", core: "争讼失败退避，可保无灾。" },
        { text: "食旧德，贞厉，终吉。或从王事，无成。", core: "守住旧德，虽危终吉，但难有大成。" },
        { text: "不克讼，复即命，渝安贞，吉。", core: "认输回头，改弦更张，吉。" },
        { text: "讼元吉。", core: "诉讼大吉，公正裁决。" },
        { text: "或锡之鞶带，终朝三褫之。", core: "赐予显赫腰带，一日之内被剥夺三次。" }
      ],
      "地水师": [
        { text: "师出以律，否臧凶。", core: "行军以纪律为本，无纪律则凶。" },
        { text: "在师中，吉无咎，王三锡命。", core: "身在军中统率，受君王再三褒奖。" },
        { text: "师或舆尸，凶。", core: "军中满载尸体，大凶之象。" },
        { text: "师左次，无咎。", core: "军队暂时退驻，无碍。" },
        { text: "田有禽，利执言，无咎。长子帅师，弟子舆尸，贞凶。", core: "田猎有获，宜发号令，若用人不当则凶。" },
        { text: "大君有命，开国承家，小人勿用。", core: "君王论功封赏，但勿用小人。" }
      ],
      "雷水解": [
        { text: "无咎。", core: "没有过错，处境安全。" },
        { text: "田获三狐，得黄矢，贞吉。", core: "猎得三狐并得铜箭，正固吉祥。" },
        { text: "负且乘，致寇至，贞吝。", core: "背负财物乘车，招摇引盗。" },
        { text: "解而拇，朋至斯孚。", core: "解开小束缚，朋友前来诚信相聚。" },
        { text: "君子维有解，吉，有孚于小人。", core: "君子解脱困境，连小人也信服。" },
        { text: "公用射隼于高墉之上，获之，无不利。", core: "在高墙射落猛禽，一举成擒。" }
      ],
      "风水涣": [
        { text: "用拯马壮，吉。", core: "用健壮之马挽救危局，吉。" },
        { text: "涣奔其机，悔亡。", core: "涣散之际抓住时机，悔恨消失。" },
        { text: "涣其躬，无悔。", core: "涣散自身，放下执念，无悔。" },
        { text: "涣其群，元吉。涣有丘，匪夷所思。", core: "解散不良群体大吉，重组新的格局。" },
        { text: "涣汗其大号，涣王居，无咎。", core: "发号施令扫除积弊，无碍。" },
        { text: "涣其血，去逖出，无咎。", core: "涣散血光之忧，脱离险境。" }
      ],
      "山水蒙": [
        { text: "发蒙，利用刑人，用说桎梏，以往吝。", core: "启蒙之初宜严明规矩，但不宜过度。" },
        { text: "包蒙，吉。纳妇，吉。子克家。", core: "包容蒙昧之人，吉，家事可成。" },
        { text: "勿用取女，见金夫，不有躬，无攸利。", core: "不宜娶此女子，品行不端。" },
        { text: "困蒙，吝。", core: "被困于蒙昧之中，可叹。" },
        { text: "童蒙，吉。", core: "孩童般的虚心求教，吉祥。" },
        { text: "击蒙，不利为寇，利御寇。", core: "攻击蒙昧，不应主动挑衅，宜防守。" }
      ],
      "泽水困": [
        { text: "臀困于株木，入于幽谷，三岁不觌。", core: "坐困枯木，三年不见天日。" },
        { text: "困于酒食，朱绂方来，利用亨祀，征凶，无咎。", core: "因酒食所困，宜祭祀，不可强征。" },
        { text: "困于石，据于蒺藜，入于其宫，不见其妻，凶。", core: "困于乱石荆棘，回家不见妻子。" },
        { text: "来徐徐，困于金车，吝，有终。", core: "缓缓而来，因金车被困，终有好结果。" },
        { text: "劓刖，困于赤绂，乃徐有说，利用祭祀。", core: "受刑被削，危难中慢慢脱困。" },
        { text: "困于葛藟，于臲兀，曰动悔有悔，征吉。", core: "困于复杂藤蔓，反思后行动则吉。" }
      ],
      "天火同人": [
        { text: "同人于门，无咎。", core: "在门前聚集志同者，无碍。" },
        { text: "同人于宗，吝。", core: "只在宗族内寻找同伴，局面有限。" },
        { text: "伏戎于莽，升其高陵，三岁不兴。", core: "伏击草莽登山，三年不成。" },
        { text: "乘其墉，弗克攻，吉。", core: "登上城墙却停止攻击，克制得吉。" },
        { text: "同人先号咷而后笑，大师克相遇。", core: "先哭后笑，两军终会师。" },
        { text: "同人于郊，无悔。", core: "在郊野广结同道，无悔。" }
      ],
      "地火明夷": [
        { text: "明夷于飞，垂其翼。君子于行，三日不食，有攸往，主人有言。", core: "受伤之鸟低垂翅膀前行，忍饥挨饿。" },
        { text: "明夷，夷于左股，用拯马壮，吉。", core: "伤在左腿，借健马之力得救。" },
        { text: "明夷于南狩，得其大首，不可疾贞。", core: "南征猎得大首恶，不可操之过急。" },
        { text: "入于左腹，获明夷之心，于出门庭。", core: "深入内部，获取核心后离开。" },
        { text: "箕子之明夷，利贞。", core: "像箕子那样装疯避祸，利于坚守。" },
        { text: "不明晦，初登于天，后入于地。", core: "由光明坠入黑暗，登高跌重。" }
      ],
      "雷火丰": [
        { text: "遇其配主，虽旬无咎，往有尚。", core: "遇见匹配主人，十日内无碍，往前有赏。" },
        { text: "丰其蔀，日中见斗，往得疑疾，有孚发若，吉。", core: "日食般昏暗正午见星斗，诚信则吉。" },
        { text: "丰其沛，日中见沫，折其右肱，无咎。", core: "正午昏暗如夜，折伤右臂但无咎。" },
        { text: "丰其蔀，日中见斗，遇其夷主，吉。", core: "暗影正午再次遮天，遇见盟友转吉。" },
        { text: "来章，有庆誉，吉。", core: "光明文采到来，吉庆获誉。" },
        { text: "丰其屋，蔀其家，窥其户，阒其无人，三岁不觌，凶。", core: "屋大遮蔽家庭，无人寂静，凶险。" }
      ],
      "风火家人": [
        { text: "闲有家，悔亡。", core: "治家严谨，悔恨自然消失。" },
        { text: "无攸遂，在中馈，贞吉。", core: "专心家务饮食，正固安吉。" },
        { text: "家人嗃嗃，悔厉吉。妇子嘻嘻，终吝。", core: "严厉治家虽悔终吉，嬉笑无度则败。" },
        { text: "富家，大吉。", core: "家庭富裕昌盛，大吉。" },
        { text: "王假有家，勿恤吉。", core: "君王到家庙祭祀，无需忧虑。" },
        { text: "有孚威如，终吉。", core: "诚信且有威仪，最终吉祥。" }
      ],
      "山火贲": [
        { text: "贲其趾，舍车而徒。", core: "装饰脚趾，弃车徒步而行。" },
        { text: "贲其须。", core: "装饰胡须，注重仪表细节。" },
        { text: "贲如濡如，永贞吉。", core: "修饰润泽，长守正固则吉。" },
        { text: "贲如皤如，白马翰如，匪寇婚媾。", core: "朴素如白马飞驰，并非抢亲坏人。" },
        { text: "贲于丘园，束帛戋戋，吝，终吉。", core: "装饰丘园礼轻，虽显寒酸终吉。" },
        { text: "白贲，无咎。", core: "返璞归真，无需过多修饰。" }
      ],
      "泽火革": [
        { text: "巩用黄牛之革。", core: "用坚韧的黄牛皮牢牢捆绑，变革之初先稳固根基。" },
        { text: "巳日乃革之，征吉，无咎。", core: "等待时机成熟再变革，前行吉祥。" },
        { text: "征凶，贞厉。革言三就，有孚。", core: "贸然行动凶险，变革方案多次论证后方可执行。" },
        { text: "悔亡，有孚改命，吉。", core: "悔恨消失，诚信推动变革，吉祥。" },
        { text: "大人虎变，未占有孚。", core: "领袖如虎纹般华丽蜕变，无需占卜也知诚信。" },
        { text: "君子豹变，小人革面。征凶，居贞吉。", core: "君子如豹纹般文采蜕变，小人只做表面功夫。" }
      ],
      "天山遁": [
        { text: "遁尾，厉，勿用有攸往。", core: "撤退时落在最后有危险，不宜再往前。" },
        { text: "执之用黄牛之革，莫之胜说。", core: "如被黄牛皮牢牢绑住，退意坚定无法动摇。" },
        { text: "系遁，有疾厉，畜臣妾吉。", core: "被牵绊无法退避有危险，暂安于小事可吉。" },
        { text: "好遁，君子吉，小人否。", core: "果断优雅地退避，君子吉，小人做不到。" },
        { text: "嘉遁，贞吉。", core: "选择最佳时机退避，正固吉祥。" },
        { text: "肥遁，无不利。", core: "从容宽裕地退避，一切顺利。" }
      ],
      "地山谦": [
        { text: "谦谦君子，用涉大川，吉。", core: "极其谦虚的君子，可渡大川，吉祥。" },
        { text: "鸣谦，贞吉。", core: "谦虚之名远扬，正固吉祥。" },
        { text: "劳谦，君子有终，吉。", core: "有功劳仍谦虚，君子终得好结果。" },
        { text: "无不利，撝谦。", core: "发挥谦虚之德，无往不利。" },
        { text: "不富以其邻，利用侵伐，无不利。", core: "不靠财富靠谦虚服人，出师也无不利。" },
        { text: "鸣谦，利用行师，征邑国。", core: "谦虚之名显赫，可以出兵讨逆。" }
      ],
      "雷山小过": [
        { text: "飞鸟以凶。", core: "飞鸟逆天而上，凶险。" },
        { text: "过其祖，遇其妣。不及其君，遇其臣。无咎。", core: "错过了大人物却遇到其助手，无碍。" },

        { text: "无咎，弗过遇之。往厉必戒，勿用永贞。", core: "没有过错，不必过度追求。前进需谨慎。" },
        { text: "密云不雨，自我西郊。公弋取彼在穴。", core: "浓云密布却不下雨，主动去洞穴中猎取。" },
        { text: "弗遇过之，飞鸟离之，凶，是谓灾眚。", core: "错失机会还过度行动，如飞鸟遭射杀。" }
      ],
      "风山渐": [
        { text: "鸿渐于干，小子厉，有言，无咎。", core: "鸿雁停在岸边，小子有危险，但终无碍。" },
        { text: "鸿渐于磐，饮食衎衎，吉。", core: "鸿雁停在磐石上，安稳饮食，吉祥。" },
        { text: "鸿渐于陆，夫征不复，妇孕不育，凶。利御寇。", core: "鸿雁停在高地，远征不归妻子难产，宜防守。" },
        { text: "鸿渐于木，或得其桷，无咎。", core: "鸿雁停在树木上，或能找到横枝，无碍。" },
        { text: "鸿渐于陵，妇三岁不孕，终莫之胜，吉。", core: "鸿雁停在山陵，三年不孕终无人能胜。" },
        { text: "鸿渐于陆，其羽可用为仪，吉。", core: "鸿雁停在高地，羽毛可做仪仗，吉祥。" }
      ],
      "水山蹇": [
        { text: "往蹇来誉。", core: "前进艰难，退回来反而获得赞誉。" },
        { text: "王臣蹇蹇，匪躬之故。", core: "君臣皆陷艰难，并非因为自身过错。" },
        { text: "往蹇来反。", core: "前进受阻，不如返回。" },
        { text: "往蹇来连。", core: "前进艰难，退回后获得连结支援。" },
        { text: "大蹇朋来。", core: "大难之时，朋友前来相助。" },
        { text: "往蹇来硕，吉。利见大人。", core: "前进艰难但回来有大收获，宜见贵人。" }
      ],
      "火山旅": [
        { text: "旅琐琐，斯其所取灾。", core: "旅途中计较琐事，自取其祸。" },
        { text: "旅即次，怀其资，得童仆，贞。", core: "找到住处怀揣资金得仆从，守正不偏。" },
        { text: "旅焚其次，丧其童仆，贞厉。", core: "旅舍被烧失仆从，处境艰难。" },
        { text: "旅于处，得其资斧，我心不快。", core: "暂得安身之处和资财，内心仍不畅快。" },
        { text: "射雉一矢亡，终以誉命。", core: "射野鸡一箭即中，最终获好名声。" },
        { text: "鸟焚其巢，旅人先笑后号咷。丧牛于易，凶。", core: "鸟巢被焚先笑后哭，大意失牛。" }
      ],
      "天泽履": [
        { text: "素履，往无咎。", core: "以朴素之心行事，前行无碍。" },
        { text: "履道坦坦，幽人贞吉。", core: "行道平坦，隐士正固吉祥。" },
        { text: "眇能视，跛能履，履虎尾，咥人，凶。武人为于大君。", core: "独眼硬看跛脚硬走踩虎尾，凶险。" },
        { text: "履虎尾，愬愬终吉。", core: "踩虎尾战战兢兢，因谨慎终得吉祥。" },
        { text: "夬履，贞厉。", core: "决然行事果断前进，正固却危险。" },
        { text: "视履考祥，其旋元吉。", core: "回顾走过的路考察吉凶，回头最为吉祥。" }
      ],
      "地泽临": [
        { text: "咸临，贞吉。", core: "以感化之心亲临督导，正固吉祥。" },

        { text: "甘临，无攸利。既忧之，无咎。", core: "甜言蜜语式亲临无效，忧患意识则无碍。" },
        { text: "至临，无咎。", core: "亲自到场到位，无过错。" },
        { text: "知临，大君之宜，吉。", core: "以智慧亲临督导，君王应有的方式。" },
        { text: "敦临，吉无咎。", core: "以敦厚之心亲临，吉祥无咎。" }

      "风泽中孚": [
        { text: "虞吉，有它不燕。", core: "诚信预则吉，三心二意则不安宁。" },
        { text: "鸣鹤在阴，其子和之。我有好爵，吾与尔靡之。", core: "鹤鸣子应，有美酒愿与你共享。" },
        { text: "得敌，或鼓或罢，或泣或歌。", core: "遇敌时或进或退或泣或歌，情绪波动。" },
        { text: "月几望，马匹亡，无咎。", core: "月将圆时马匹丢失，却无大碍。" },
        { text: "有孚挛如，无咎。", core: "诚信紧密相连如攥拳，无咎。" },
        { text: "翰音登于天，贞凶。", core: "鸡鸣之声登天虚张声势，正固也凶。" }
      ],
      "水泽节": [
        { text: "不出户庭，无咎。", core: "不迈出庭院，没有灾祸。" },
        { text: "不出门庭，凶。", core: "不迈出大门，反而凶险。" },
        { text: "不节若，则嗟若，无咎。", core: "不知节制你会叹息，但无大过。" },
        { text: "安节，亨。", core: "安于节制之道，亨通顺利。" },
        { text: "甘节，吉。往有尚。", core: "以节制为甘甜，吉祥，前行有赏。" },
        { text: "苦节，贞凶，悔亡。", core: "以节制为苦涩，正固也凶，但悔终消。" }
      ],
      "火泽睽": [
        { text: "悔亡，丧马勿逐，自复。见恶人，无咎。", core: "丢失马匹不必追寻，自然会回来。见恶人也无妨。" },
        { text: "遇主于巷，无咎。", core: "在小巷中遇见主人，没有过错。" },
        { text: "见舆曳，其牛掣，其人天且劓，无初有终。", core: "车被拖牛被扯人受刑，开始不顺结局尚可。" },
        { text: "睽孤，遇元夫，交孚，厉无咎。", core: "孤独隔离时遇元夫，诚信相交有险但无咎。" },
        { text: "悔亡，厥宗噬肤，往何咎。", core: "悔恨消失，同宗吃肉，前去有什么过失。" },
        { text: "睽孤，见豕负涂，载鬼一车，先张之弧，后说之弧。", core: "孤独中疑神疑鬼，先拉弓后放下，终见真相。" }
      ],
      "山泽损": [
        { text: "已事遄往，无咎，酌损之。", core: "放下私事速往助人，酌情减损自己。" },
        { text: "利贞，征凶，弗损益之。", core: "利于守正，贸然前进凶，不减反增。" },
        { text: "三人行，则损一人。一人行，则得其友。", core: "三人同行减一人，一人独行反得友。" },
        { text: "损其疾，使遄有喜，无咎。", core: "减去弊病，迅速带来喜事。" },
        { text: "或益之十朋之龟，弗克违，元吉。", core: "有人以十朋大龟馈赠，不必推辞大吉。" },
        { text: "弗损益之，无咎，贞吉。利有攸往，得臣无家。", core: "不减反增无咎，利于前行，得无家之臣相助。" }
      ],
      "水火既济": [
        { text: "曳其轮，濡其尾，无咎。", core: "拖住车轮浸湿尾巴，虽慢但无碍。" },
        { text: "妇丧其茀，勿逐，七日得。", core: "妇人丢失头饰，不用追，七日后会找回。" },
        { text: "高宗伐鬼方，三年克之，小人勿用。", core: "三年征战才获胜，不可用小人。" },
        { text: "繻有衣袽，终日戒。", core: "有破旧衣物棉絮备着，终日警戒。" },
        { text: "东邻杀牛，不如西邻之禴祭，实受其福。", core: "东邻杀牛厚祭，不如西邻薄祭心诚。" },
        { text: "濡其首，厉。", core: "把头浸入水中，危险。" }
      ]

    // ========== 决策引擎核心函数 ==========

    function getTrendDirection(bianEssence) {
      if (!bianEssence) return "中性";
      const e = bianEssence;
      if (/益|升|顺|吉|丰|晋|泰|大有|同人|既济|中孚|家人|兑/.test(e)) return "积极";
      if (/损|否|困|剥|明夷|蹇|大过|蛊|讼|睽|旅|未济/.test(e)) return "消极";
      return "中性";
    }

    function getScenarioPrefix(scenarioKey) {
      if (scenarioKey === "love" || scenarioKey === "love_general" || scenarioKey === "love_ambiguous" || scenarioKey === "love_reconcile") return "love";
      if (scenarioKey === "career") return "career";
      if (scenarioKey === "money") return "career";
      if (scenarioKey === "study") return "study";
      return "generic";
    }

    /***********************
     * 1. 体用 → 根判断（不可被覆盖）
     ***********************/
    function getTiYongBase(tiYongType) {
      switch (tiYongType) {
        case "用克体":
          return { level: "fail", score: -2, desc: "外部压制你，结构性不利" };
        case "体生用":
          return { level: "conditional", score: -1, desc: "你在持续付出，存在消耗" };
        case "用生体":
          return { level: "success", score: +2, desc: "外部助力明显" };
        case "体克用":
          return { level: "success", score: +1, desc: "你有掌控力" };
        case "比和":
        default:
          return { level: "conditional", score: 0, desc: "双方平衡，未分胜负" };
      }
    }

    /***********************
     * 2. 变卦趋势判定
     ***********************/
    function getBianGuaTrend(bianGuaName) {
      const positive = ["益","升","泰","大有","晋","豫","随","解"];
      const negative = ["否","困","剥","蹇","损","明夷","坎","蒙"];

      if (positive.some(k => bianGuaName.includes(k))) {
        return { trend: "up", weight: +1 };
      }
      if (negative.some(k => bianGuaName.includes(k))) {
        return { trend: "down", weight: -1 };
      }
      return { trend: "neutral", weight: 0 };
    }

    /***********************
     * 3. 综合裁决（核心）
     ***********************/
    function calcFinalDecision({ tiYongType, bianGuaName }) {
      const base = getTiYongBase(tiYongType);
      const trend = getBianGuaTrend(bianGuaName);

      let finalScore = base.score + trend.weight;

      if (base.level === "fail" && finalScore > 0) {
        finalScore = 0;
      }

      let finalLevel = "conditional";
      if (finalScore >= 2) finalLevel = "success";
      else if (finalScore <= -2) finalLevel = "fail";

      return { finalLevel, finalScore, base, trend };
    }

    /***********************
     * 4. 动爻 → 触发机制
     ***********************/
    function getYaoTrigger(moveYao) {
      const map = {
        1: "当出现第一次反馈时，才有判断依据",
        2: "当事情开始自行推进，才算进入正轨",
        3: "当问题反复出现，就是结构问题",
        4: "当旧方法失效，必须调整策略",
        5: "当对方主动，才是真机会",
        6: "当你开始犹豫，其实答案已经出现"
      };
      return map[moveYao] || "";
    }

    function buildDecisionReport(result, interpretation) {
      const tiYongType = interpretation.meta.tiYongType || "比和";
      const moveYao = interpretation.meta.moveYao || 1;
      const scenarioKey = interpretation.meta.scenarioKey || "general";
      const benGuaName = interpretation.meta.benGuaName || "";
      const bianGuaName = interpretation.meta.bianGuaName || "";

      const decision = calcFinalDecision({ tiYongType, bianGuaName });
      const trigger = getYaoTrigger(moveYao);

      let coreJudgement = "";
      let bullets = [];
      let situation = "";

      if (decision.finalLevel === "success") {
        coreJudgement = "能成，但有前提。";
        bullets = [

        ];
        situation = "当前局势在往正确方向走，但节奏不能被你打乱。";
      } else if (decision.finalLevel === "fail") {
        coreJudgement = "很难成，不建议继续投入。";
        bullets = [
          "这件事在结构上对你不利，不是努力就能解决。",
          "你越投入，消耗越明显，但对方未必承接。",
          trigger
        ];
        situation = "当前局势是外部压制你，而不是你推动不够。";

          trigger
        ];
        situation = "关系或局势在推进，但你的投入已经开始领先于它本身。";
      }

      const scenarioForVerdict = scenarioKey === 'love' || scenarioKey === 'love_general' || scenarioKey === 'love_ambiguous' || scenarioKey === 'love_reconcile' ? 'love' :
                                 scenarioKey === 'career' ? 'career' :
                                 scenarioKey === 'study' ? 'study' : 'generic';

      let coreVerdict = coreJudgement;
      if (typeof VERDICT_DB !== 'undefined' && VERDICT_DB[benGuaName] && VERDICT_DB[benGuaName][scenarioForVerdict]) {
        coreVerdict = VERDICT_DB[benGuaName][scenarioForVerdict];
      }

      const isUrgent = (
        tiYongType === "用克体" &&
        decision.trend.trend === "down" &&
        moveYao === 5

      return {

        introHint: ""
      },
      content: {
        relationshipState: "",
        misjudgment: "",
        boundary: "",
        action: "",
        trend: "",
        releaseCondition: "",
        riskWarning: "",
        guaSummary: ""
      },
      ui: {
        showUpgradeEntry: true,
        showSummaryCardEntry: true,
        resultTone: "steady"
      }
    };
    
    // ===================== Task A2: 最小可运行判定骨架 =====================

    // 强信号词库（优先级最高，命中即确定场景）
    const STRONG_SIGNALS = {
      love: ["喜欢你", "爱上", "表白", "复合", "在一起", "有没有戏", "能不能成", "怎么追", "想追", "搭讪", "分手", "前任", "暧昧", "暗恋"],
      lost: ["丢了", "找不到", "遗失", "失物", "东西在哪", "找手机", "找钥匙", "找钱包", "不见了"]
    };

    // 社交邀约词库（命中且无强感情词时，强制走通用场景）
    const SOCIAL_INVITES = ["找我玩", "约我", "一起玩", "找我逛街", "来找我玩", "会不会来找我", "会来找我吗", "能不能约", "有空吗", "出去玩"];
    const LOVE_PRONOUNS = ["她", "他", "前任", "男朋友", "女朋友", "男友", "女友", "男神", "女神", "暧昧对象", "相亲对象", "TA"];

    function getScenarioKey(question = "") {
      const q = String(question).trim();
      if (!q) return "general";

      // 第一层：强信号词库优先匹配
      // 检查强感情信号
      for (const keyword of STRONG_SIGNALS.love) {
        if (q.includes(keyword)) return "love";
      }
      // 检查强失物信号
      for (const keyword of STRONG_SIGNALS.lost) {
        if (q.includes(keyword)) return "lost";
      }

      // 第二层：社交邀约过滤
      // 如果包含社交邀约词，且没有命中强感情词，直接走通用
      // 额外检查：如果同时包含感情相关代词（如"她"、"他"），则跳过拦截
      let hasSocialInvite = false;
      for (const keyword of SOCIAL_INVITES) {
        if (q.includes(keyword)) {
          hasSocialInvite = true;
          break;
        }
      }
      if (hasSocialInvite) {
        let hasLovePronoun = false;
        for (const pronoun of LOVE_PRONOUNS) {
          if (q.includes(pronoun)) {
            hasLovePronoun = true;
            break;
          }
        }
        if (!hasLovePronoun) return "general";
      }

      // 第三层：正则兜底
      for (let scenario of QUEST_SCENARIO) {
        if (scenario.reg.test(q)) {
          return scenario.type;
        }
      }
      return "general";
    }

    function getTiYongType(result) {
      const tiEle = result?.ti?.ele;
      const yongEle = result?.yong?.ele;
      if (!tiEle || !yongEle) return "比和";
      if (tiEle === yongEle) return "比和";
      if (RELATION_MAP?.[tiEle]?.生 === yongEle) return "体生用";
      if (RELATION_MAP?.[yongEle]?.生 === tiEle) return "用生体";
      if (RELATION_MAP?.[tiEle]?.克 === yongEle) return "体克用";
      if (RELATION_MAP?.[yongEle]?.克 === tiEle) return "用克体";
      return "比和";
    }

    function getMovingLineBucket(moveYao) {
      const n = Number(moveYao) || 1;
      if (n <= 2) return "1-2";
      if (n <= 4) return "3-4";
      return "5-6";
    }

    function cloneInterpretationTemplate() {
      return JSON.parse(JSON.stringify(INTERPRETATION_TEMPLATE));
    }

    function buildInterpretation(result, question = "") {
      const scenarioKey = getScenarioKey(question);
      const scenario = SCENARIO_RULES[scenarioKey] || SCENARIO_RULES.love_general;
      const benGuaName = result?.benGuaName || "";
      const bianGuaName = result?.bianGuaName || "";
      const moveYao = result?.moveYao || 1;
      const highFreqRule = HIGH_FREQ_RULES[benGuaName];
      const tiYongType = getTiYongType(result);
      const movingLineBucket = getMovingLineBucket(moveYao);
      const interp = cloneInterpretationTemplate();
      interp.meta.question = question;
      interp.meta.scenarioKey = scenarioKey;
      interp.meta.benGuaName = benGuaName;
      interp.meta.bianGuaName = bianGuaName;
      interp.meta.moveYao = moveYao;
      interp.meta.tiYongType = tiYongType;
      interp.meta.movingLineBucket = movingLineBucket;
      interp.meta.tiEle = result?.ti?.ele || '';
      interp.meta.tiName = result?.ti?.name || '';
      interp.meta.yongEle = result?.yong?.ele || '';
      interp.meta.yongName = result?.yong?.name || '';
      interp.meta.huGuaName = result?.huGuaName || '';
      interp.lines.introHint = scenario?.introHint || "";

      let baseContentFinal;
      const isLoveScenario = scenarioKey === "love" || scenarioKey === "love_general" || scenarioKey === "love_ambiguous" || scenarioKey === "love_reconcile";

      if (isLoveScenario) {
        baseContentFinal = GUA_CONTENT_MAP[benGuaName];
      } else {
        const template = SCENARIO_CONTENT_TEMPLATES[scenarioKey] || SCENARIO_CONTENT_TEMPLATES.general;
        const essence = GUA_ESSENCE[benGuaName] || { essence: "待定", pattern: "局势待明", keyPoint: "保持观察" };
        
        const contextMap = {
          "比和": "双方能量协调，节奏同步",
          "体生用": "体卦生用卦，需要主动付出",
          "用生体": "用卦生体卦，外力在滋养你",
          "体克用": "体卦克用卦，主动权在你手里",
          "用克体": "用卦克体卦，环境在压制你"
        };
        
        const context = contextMap[tiYongType] || "局势正在变化中";
        
        if (template) {
          baseContentFinal = {
            keywords: typeof template.keywords === 'function' ? template.keywords(essence) : [essence.essence],
            relationshipState: typeof template.relationshipState === 'function' ? template.relationshipState(essence, benGuaName) : template.relationshipState,
            misjudgment: typeof template.misjudgment === 'function' ? template.misjudgment(essence) : template.misjudgment,
            boundary: typeof template.boundary === 'function' ? template.boundary(essence) : template.boundary,
            action: typeof template.action === 'function' ? template.action(essence) : template.action,
            baseConclusion: typeof template.baseConclusion === 'function' ? template.baseConclusion(essence) : template.baseConclusion,
            trend: typeof template.trend === 'function' ? template.trend(essence) : template.trend,
            releaseCondition: typeof template.releaseCondition === 'function' ? template.releaseCondition(essence) : template.releaseCondition,
            riskWarning: typeof template.riskWarning === 'function' ? template.riskWarning(essence) : template.riskWarning,
            guaSummary: typeof template.guaSummary === 'function' ? template.guaSummary(essence) : template.guaSummary
          };

          // 尝试从AI预置文案补充中读取
          const aiFallback = window._aiFallback || null;
          if (aiFallback) {
            if (!baseContentFinal.relationshipState || baseContentFinal.relationshipState.includes("请参考")) {
              if (aiFallback.relationshipState) baseContentFinal.relationshipState = aiFallback.relationshipState;
            }
            if (!baseContentFinal.misjudgment || baseContentFinal.misjudgment.includes("请参考")) {
              if (aiFallback.misjudgment) baseContentFinal.misjudgment = aiFallback.misjudgment;
            }
            if (!baseContentFinal.boundary || baseContentFinal.boundary.includes("请参考")) {
              if (aiFallback.boundary) baseContentFinal.boundary = aiFallback.boundary;
            }
            if (!baseContentFinal.action || baseContentFinal.action.includes("请参考")) {
              if (aiFallback.action) baseContentFinal.action = aiFallback.action;
            }
            if (!baseContentFinal.riskWarning || baseContentFinal.riskWarning.includes("请参考")) {
              if (aiFallback.riskWarning) baseContentFinal.riskWarning = aiFallback.riskWarning;
            }
          }
        } else {
          baseContentFinal = {
            keywords: [essence.essence],
            relationshipState: "当前正处于「" + essence.pattern + "」的阶段，" + context + "。",
            misjudgment: "容易在「" + essence.pattern + "」的表象下做出错误判断。" + essence.keyPoint,
            boundary: "不宜在尚未看清局势时做出重大决定。",
            action: "建议优先考虑" + essence.keyPoint,
            baseConclusion: essence.pattern,
            trend: "局势正在变化",
            releaseCondition: "当「" + essence.pattern + "」的信号明确时，就是行动的最佳时机。",
            riskWarning: "在「" + essence.pattern + "」阶段最忌盲目行动。",
            guaSummary: essence.keyPoint
          };
        }
      }

      if (!baseContentFinal || !baseContentFinal.relationshipState) {
        const essence = GUA_ESSENCE[benGuaName];
        if (essence) {
          baseContentFinal = {
            keywords: [essence.essence],
            relationshipState: "当前这段关系正处在\"" + essence.pattern + "\"的阶段。",
            misjudgment: "需要警惕的是：" + essence.keyPoint,
            boundary: "不宜在尚未看清局势时做出过度承诺或强推。",
            action: "建议优先考虑" + essence.keyPoint,
            baseConclusion: essence.pattern,
            trend: "更适合观察",
            releaseCondition: "当你能明显感受到对方的配合和回应时，再推进不迟。",
            riskWarning: "过于急躁可能会破坏原本不错的初始局面。",
            guaSummary: essence.keyPoint
          };
        } else {
          baseContentFinal = {
            keywords: ["待定"],
            relationshipState: "当前卦象内容暂缺，但请放心，这会是一个整体向好的变化过程。",
            misjudgment: "不必过度担心，暂时没有不良判断。",
            boundary: "可以适当放缓节奏，待局势更加明朗。",
            action: "保持平常心，正常相处即可。",
            baseConclusion: "局面目前还在发展中，继续观察会有更清晰的信号。",
            trend: "更适合观察",
            releaseCondition: "保持互动，耐心等一等。",
            riskWarning: "目前没有明确的风险，请勿自己吓自己。",
            guaSummary: "卦象暂未收录，但天机正在运转。"
          };
        }
      }

      interp.lines.mainLine = highFreqRule?.tiYongRules?.[tiYongType] || highFreqRule?.defaultLine || baseContentFinal.baseConclusion;
      if (interp.lines.mainLine && interp.lines.mainLine.length > 18) {
        const firstBreak = interp.lines.mainLine.search(/[，。；]/);
        if (firstBreak > 6) {
          interp.lines.mainLine = interp.lines.mainLine.slice(0, firstBreak);
        }
      }

      // 使用 V2 规则的体用偏向替代原有 mainLine（如果存在）
      const ruleV2 = HIGH_FREQ_RULES[benGuaName];
      if (ruleV2 && ruleV2.tiYongRules) {
        const bias = ruleV2.tiYongRules[tiYongType] || ruleV2.defaultLine;
        const scenePrefix = (scenarioKey === 'love') ? "这段关系" :
                            (scenarioKey === 'career') ? "当前事业" :
                            (scenarioKey === 'money') ? "财运方面" :
                            (scenarioKey === 'study') ? "学业上" :
                            (scenarioKey === 'health') ? "身体状况" :
                            (scenarioKey === 'lost') ? "失物寻找" : "当前事情";
        interp.lines.mainLine = `${scenePrefix}：${bias}。`;
      }

      const verdictDbKey = (scenarioKey === 'love') ? 'love' :
                            (scenarioKey === 'career') ? 'career' :
                            (scenarioKey === 'study') ? 'study' : 'generic';
      const verdictLine = VERDICT_DB[benGuaName]?.[verdictDbKey];
      if (verdictLine) {
        interp.lines.mainLine = verdictLine;
      }

      interp.lines.stageLine = highFreqRule?.movingLineRules?.[movingLineBucket] || baseContentFinal.relationshipState;
      interp.content.relationshipState = baseContentFinal.relationshipState;
      interp.content.misjudgment = baseContentFinal.misjudgment;
      interp.content.boundary = baseContentFinal.boundary;
      interp.content.action = baseContentFinal.action;
      interp.content.trend = baseContentFinal.trend;
      interp.content.releaseCondition = baseContentFinal.releaseCondition;
      interp.content.riskWarning = baseContentFinal.riskWarning;
      interp.content.guaSummary = baseContentFinal.guaSummary;

      const chipRewrite = (text) => {
        if (!text || text.length < 8) return text;
        let r = text.replace(/目前正处在|正处于|当前处于/g, "").replace(/阶段/g, "阶段，这很正常").replace(/还远没有到/g, "暂时不到").replace(/但还|但远/g, "，暂时");
        if (r.length > 30) { const c = r.search(/[，。；]/); if (c > 10 && c < 35) r = r.slice(0, c); }
        return r.trim() || text;
      };
      interp.lines.stageLine = chipRewrite(interp.lines.stageLine);

      // 若有爻辞，则将核心义融入阶段判断
      if (YAO_CI[benGuaName] && YAO_CI[benGuaName][moveYao - 1]) {
        const yaoCore = YAO_CI[benGuaName][moveYao - 1].core;
        interp.lines.stageLine = `第${moveYao}爻启示：${yaoCore}。` + (interp.lines.stageLine ? ' ' + interp.lines.stageLine : '');
      }

      interp.content.boundary = chipRewrite(interp.content.boundary);
      interp.content.trend = chipRewrite(interp.content.trend);




      
      // ========== 决策断语库集成 ==========
      const bianEssenceForDecision = GUA_ESSENCE[bianGuaName] || { essence: "" };
      const trendDirection = (
        /益|升|顺|吉|亨|泰|通|成|利|进|兴|荣|昌|盛|旺/.test(bianEssenceForDecision.essence)
      ) ? "积极" : (
        /难|险|困|凶|否|阻|退|衰|败|损|耗|散|剥|坎|困|蹇/.test(bianEssenceForDecision.essence)
      ) ? "消极" : "积极";

      const scenarioCategory = isLoveScenario ? "love" : scenarioKey === "career" ? "career" : "generic";
      const decisionKey = `${tiYongType}_${trendDirection}`;

      interp.lines.decisionVerdict = DECISION_LIBRARY.outcomeVerdict[decisionKey]?.[scenarioCategory]
        || DECISION_LIBRARY.outcomeVerdict[decisionKey]?.generic
        || "";

      interp.lines.powerPosition = DECISION_LIBRARY.powerDynamic[tiYongType]?.[scenarioCategory]
        || DECISION_LIBRARY.powerDynamic[tiYongType]?.generic
        || "";

      interp.lines.signalHint = DECISION_LIBRARY.keySignal[moveYao]?.[scenarioCategory]
        || DECISION_LIBRARY.keySignal[moveYao]?.generic
        || "";

      interp.ui = {
        showUpgradeEntry: true,
        showSummaryCardEntry: true,
        resultTone: tiYongType === "用克体" ? "cautious" : (tiYongType === "用生体" ? "positive" : "steady")
      };
      
      return interp;
    }

    // 根据 interpretation 构建分享文本
    function buildShareText(interpretation) {
      const meta = interpretation?.meta || {};
      const lines = interpretation?.lines || {};
      const content = interpretation?.content || {};
      const scenarioLabel = SCENARIO_RULES[meta.scenarioKey]?.label || '综合解读';
      return `【算个der · ${scenarioLabel}】

📋 问题：${meta.question || ''}

卦象：${meta.benGuaName || ''} → ${meta.bianGuaName || ''}
动爻：第${meta.moveYao || '?'}爻（${meta.movingLineBucket || '?'}区间）
体用：${meta.tiYongType || ''}

核心结论：${lines.mainLine || ''}
阶段判断：${lines.stageLine || ''}

关系状态：${content.relationshipState || ''}
行动建议：${content.action || ''}

⚠️ ${content.riskWarning || ''}

—— 来自「算个der」`;
    }

    // 场景类型
    const QUEST_SCENARIO = [
      {type: "love", reg: /桃花|感情|恋爱|复合|对象|脱单|喜欢|表白|相亲|回头|在一起|喜欢我|有可能|发展|有没有戏|能不走下去|能不能成|怎么追|想追|搭讪|来找我|来找|找我玩|约我|约我吗|约我玩|主动找我|会不会联系|还会联系吗|会来找|会找我|想找我/, desc: "感情桃花类"},
      {type: "ticket", reg: /票|候补|抢票|预约|出行|车票|机票/, desc: "票务出行类"},
      {type: "career", reg: /工作|事业|面试|升职|加薪|跳槽|创业|项目/, desc: "事业工作类"},
      {type: "money", reg: /财运|钱|工资|投资|收益|破财|赚钱|理财/, desc: "财运财富类"},
      {type: "study", reg: /考试|考得过|能过吗|能不能过|过不过得了|六级|四级|雅思|托福|期末|资格证|笔试|面试题|刷题|复习|备考|学习|考研|上岸|成绩|学业|考证|分数|分数线|挂科|补考/, desc: "学业考试类"},
      {type: "health", reg: /健康|生病|体检|养生|睡眠|饮食|身体|不舒服|疼|痛/, desc: "健康养生类"},
      {type: "lost", reg: /找手机|找钥匙|找钱包|找不到|丢了|失物|遗失|东西在哪|不见了/, desc: "失物寻找类"},
      {type: "general", reg: /.*/, desc: "通用杂事类"}
    ];

    // ===================== 工具函数 =====================
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function randomNum() {
      document.getElementById('num1').value = Math.floor(Math.random() * 8) + 1;
      document.getElementById('num2').value = Math.floor(Math.random() * 8) + 1;
    }

    function clearInput() {
      document.getElementById('question').value = '';
      document.getElementById('num1').value = '';
      document.getElementById('num2').value = '';
      document.getElementById('resultArea').classList.add('hidden');
      document.getElementById('resultArea').innerHTML = '';
    }

    function setScenario(type) {
      const questionInput = document.getElementById('question');
      const prompts = {
        "感情": "这段关系接下来会怎么发展？",
        "事业": "我这份工作接下来的发展前景如何？",
        "财运": "我最近的财运怎么样，适合投资吗？",
        "失物": "我把东西丢在哪儿了，怎么找到它？",
        "学业": "这次考试我能顺利通过吗？",
        "健康": "我最近身体状况的趋势如何？",
        "通用": ""
      };
      if (questionInput) {
        questionInput.value = prompts[type] || "我这件事接下来会怎么样？";
        questionInput.focus();
      }
    }


// ========== [S3] 推演引擎层：纯函数，不操作DOM ==========
    // ===================== 卦象计算 =====================
    // 先天数对应八卦：1=乾, 2=兑, 3=离, 4=震, 5=巽, 6=坎, 7=艮, 8=坤
    // 变爻计算：动爻位置 = (数1 + 数2) % 6，结果0时为6爻动
    // 变卦规则：动爻位阳变阴、阴变阳
    function calcGua(num1, num2) {
      const n1 = Math.max(1, Math.min(8, parseInt(num1) || 1));
      const n2 = Math.max(1, Math.min(8, parseInt(num2) || 1));
      
      // 先天数转卦索引（0-7对应乾兑离震巽坎艮坤）
      const shangIdx = n1 - 1;
      const xiaIdx = n2 - 1;
      
      // 计算动爻位置（1-6）
      const total = n1 + n2;
      const moveYao = total % 6 === 0 ? 6 : total % 6;
      
      // 八卦阴阳：乾震坎艮为阳（0），兑离巽坤为阴（1）
      const isYang = [true, false, false, true, false, true, true, false];
      
      // 计算变卦
      let shangBianIdx = shangIdx;
      let xiaBianIdx = xiaIdx;
      
      if (moveYao >= 4) {
        shangBianIdx = isYang[shangIdx] ? getComplementGua(shangIdx) : getYinComplement(shangIdx);
      } else {
        xiaBianIdx = isYang[xiaIdx] ? getComplementGua(xiaIdx) : getYinComplement(xiaIdx);
      }
      
      // 计算互卦（二三四爻=下互，三四五爻=上互）
      const huGua = calcHuGua(shangIdx, xiaIdx);
      
      const benGuaName = SIXTY_FOUR_GUA[shangIdx][xiaIdx];
      const bianGuaName = SIXTY_FOUR_GUA[shangBianIdx][xiaBianIdx];
      const huGuaName = SIXTY_FOUR_GUA[huGua.shangIdx][huGua.xiaIdx];
      
      return {
        shang: GUA_BASE[shangIdx],
        xia: GUA_BASE[xiaIdx],
        moveYao: moveYao,
        benGuaName: benGuaName,
        bianGuaName: bianGuaName,
        huGuaName: huGuaName,
        benSym: GUA_BASE[shangIdx].sym + GUA_BASE[xiaIdx].sym,
        bianSym: GUA_BASE[shangBianIdx].sym + GUA_BASE[xiaBianIdx].sym,
        huSym: GUA_BASE[huGua.shangIdx].sym + GUA_BASE[huGua.xiaIdx].sym,
        ti: GUA_BASE[xiaIdx],
        yong: GUA_BASE[shangIdx],
        hu: {
          shang: GUA_BASE[huGua.shangIdx],
          xia: GUA_BASE[huGua.xiaIdx]
        }
      };
    }
    
    // 计算互卦
    function calcHuGua(shangIdx, xiaIdx) {
      // 获取本卦的六爻（从下往上：初爻、二爻、三爻、四爻、五爻、上爻）
      const shangGua = GUA_BASE[shangIdx];
      const xiaGua = GUA_BASE[xiaIdx];
      
      // 下卦爻：初爻、二爻、三爻
      // 上卦爻：四爻、五爻、上爻
      const xiaYao = xiaGua.yao; // [下, 中, 上]
      const shangYao = shangGua.yao; // [下, 中, 上]
      
      // 二三四爻 = 下互（取本卦的二三四爻）
      // 二爻 = 下卦中爻
      // 三爻 = 下卦上爻
      // 四爻 = 上卦下爻
      const huXiaYao = [xiaYao[1], xiaYao[2], shangYao[0]];
      
      // 三四五爻 = 上互（取本卦的三四五爻）
      // 三爻 = 下卦上爻
      // 四爻 = 上卦下爻

      const huShangYao = [xiaYao[2], shangYao[0], shangYao[1]];

      clearResultCardObserver();

      if (!targetArea) return;

      if (!interpretation) { targetArea.innerHTML = '<div class="glass-card p-4 text-center">数据异常</div>'; return; }
      
      const meta = interpretation.meta || {};
      const lines = interpretation.lines || {};
      const content = interpretation.content || {};
      const ui = interpretation.ui || {};

      // ===== 第1层：结论卡（合并卦象符号+核心裁决+芯片） =====
      try {
        if (typeof buildDecisionReport === 'function') {
          const report = buildDecisionReport(result, interpretation);
          const displayVerdict = report ? (report.coreJudgement || report.coreVerdict || lines.mainLine || '') : (lines.mainLine || '');
          let borderColor = 'var(--accent)';
          const vfc = displayVerdict || '';
          if (vfc.includes('很难') || vfc.includes('不建议') || vfc.includes('不会') || vfc.includes('不可能')) borderColor = 'var(--error)';
          else if (vfc.includes('能成') || vfc.includes('可以') || vfc.includes('会有') || vfc.includes('有机会')) borderColor = 'var(--success)';

          // 紧急卦提示（独立弹在最前面）
          if (report && report.isUrgent) {
            const urgentCard = document.createElement('div');
            urgentCard.className = 'glass-card p-4 mb-4 animate-in';
            urgentCard.style.cssText = 'border-left: 4px solid var(--error); background: rgba(224,85,85,0.08);';
            urgentCard.innerHTML = `<div class="flex gap-2 items-start"><span style="font-size:1.2rem;flex-shrink:0;">⚠️</span><p class="text-sm leading-6" style="color:var(--error);">${report.urgentMessage}</p></div>`;
            targetArea.appendChild(urgentCard);

          const bName = meta.benGuaName || '';
          const cName = meta.bianGuaName || '';

    let resultCardObserver = null;

    function clearResultCardObserver() {
      if (resultCardObserver) {
        resultCardObserver.disconnect();
        resultCardObserver = null;
      }
    }

    function setActiveResultCard(activeCard, cards) {
      cards.forEach((card, index) => {
        const isActive = card === activeCard;

        card.classList.toggle("is-active-step", isActive);
        card.classList.toggle("is-inactive-step", !isActive);
        card.style.setProperty("--result-step-index", String(index));
      });
    }

    function activateResultCards() {
      const cards = Array.from(document.querySelectorAll(".result-step-card"));
      if (!cards.length) return;

      clearResultCardObserver();

      // 默认先激活第一张
      setActiveResultCard(cards[0], cards);

      resultCardObserver = new IntersectionObserver(
        entries => {
          const visibleEntries = entries
            .filter(entry => entry.isIntersecting)
            .sort((a, b) => b.intersectionRatio - a.intersectionRatio);

          if (!visibleEntries.length) return;

          const nextActiveCard = visibleEntries[0].target;
          setActiveResultCard(nextActiveCard, cards);
        },
        {
          root: null,
          threshold: [0.2, 0.35, 0.5, 0.7],
          rootMargin: "-10% 0px -35% 0px"
        }
      );

      cards.forEach(card => resultCardObserver.observe(card));
    }

    // ===== 月度报告 =====
    function checkMonthlyReport() {
      var now = new Date();
      var currentMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      var lastReport = localStorage.getItem('lastMonthlyReport');
      if (now.getDate() <= 3 && lastReport !== currentMonth) {
        var report = generateMonthlyReport(now.getMonth(), now.getFullYear());
        if (report.total > 0) {
          showMonthlyReport(report);
          localStorage.setItem('lastMonthlyReport', currentMonth);
        }
      }
    }
    function generateMonthlyReport(month, year) {
      try {
        var history = JSON.parse(localStorage.getItem('divinationHistory') || '[]');
        var monthStr = year + '-' + String(month + 1).padStart(2, '0');
        var monthRecords = history.filter(function(item) {
          return item.date && item.date.slice(0, 7) === monthStr;
        });
        if (monthRecords.length === 0) return { total: 0 };
        var scenarioCounts = {};
        var guaCounts = {};
        monthRecords.forEach(function(item) {
          var sc = item.scenario || 'general';
          scenarioCounts[sc] = (scenarioCounts[sc] || 0) + 1;
          var gn = item.benGuaName || '';
          if (gn) guaCounts[gn] = (guaCounts[gn] || 0) + 1;
        });
        var topScenario = '';
        var topCount = 0;
        for (var k in scenarioCounts) {
          if (scenarioCounts[k] > topCount) { topCount = scenarioCounts[k]; topScenario = k; }
        }
        var topGua = '';
        var topGuaCount = 0;
        for (var g in guaCounts) {
          if (guaCounts[g] > topGuaCount) { topGuaCount = guaCounts[g]; topGua = g; }
        }
        var scenarioNameMap = { love:'感情', career:'事业', wealth:'财运', study:'学业', health:'健康', lost:'失物', general:'通用' };
        var lastVerdict = monthRecords[monthRecords.length - 1].mainLine || '';
        return {
          total: monthRecords.length,
          topScenario: scenarioNameMap[topScenario] || '通用',
          topGua: topGua,
          lastVerdict: lastVerdict.slice(0, 20)
        };
      } catch(e) {
        return { total: 0 };
      }
    }

        return raw ? JSON.parse(raw) : { unlockedGua: [], unlockTimes: {}, lastCheck: '' };
      } catch(e) { return { unlockedGua: [], unlockTimes: {}, lastCheck: '' }; }

    function saveCollectionData(data) {
      localStorage.setItem(COLLECTION_KEY, JSON.stringify(data));

    function unlockGua(guaName) {
      const data = getCollectionData();
      if (!data.unlockedGua.includes(guaName)) {
        data.unlockedGua.push(guaName);

      data.unlockTimes[guaName] = new Date().toISOString();
      saveCollectionData(data);

    function loadCollectionData() {
      const data = getCollectionData();
      const container = document.getElementById('collectionBody');

      try {
        var historyRaw = localStorage.getItem(HISTORY_KEY);
        if (historyRaw) {
          var historyData = JSON.parse(historyRaw);
          var changed = false;
          for (var h = 0; h < historyData.length; h++) {
            var hGua = historyData[h].benGuaName;
            if (hGua && data.unlockedGua.indexOf(hGua) === -1) {
              data.unlockedGua.push(hGua);
              if (!data.unlockTimes) data.unlockTimes = {};

                var d = new Date(historyData[h].date || Date.now());

      if (unlockedCount >= 64) titles.push('观变之人');

        for (var t = 0; t < titles.length; t++) {
          html += '<span style="font-size:0.7rem;color:var(--accent);background:rgba(201,166,107,0.08);padding:0.25rem 0.6rem;border-radius:4px;border:1px solid rgba(201,166,107,0.15);">' + titles[t] + '</span>';

    // ===================== 记录管理 =====================
    const HISTORY_KEY = 'suan_ge_der_history';
    const MAX_HISTORY = 50;

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch (e) { return []; }
    }

    function showGuaDetail(guaName, isUnlocked, timeStr) {
      if (!isUnlocked) {
        showToast('🔒 尚未解锁「' + guaName + '」');
        return;
      }
      showToast('📜 「' + guaName + '」' + (timeStr ? ' — ' + timeStr + ' 解锁' : ''));
    }

    function saveToHistory(interpretation) {
      if (!interpretation || !interpretation.meta) return;
      const history = getHistory();
      const record = {
        id: Date.now(),
        date: new Date().toLocaleString('zh-CN'),
        question: interpretation.meta?.question || '',
        scenario: interpretation.meta?.scenarioKey || 'general',
        benGuaName: interpretation.meta?.benGuaName || '',
        mainLine: interpretation.lines?.mainLine || '',
        interpretation: interpretation
      };
      history.unshift(record);
      if (history.length > MAX_HISTORY) history.splice(MAX_HISTORY);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function getGuaSymbol(guaName) {
      if (!guaName) return '☯';
      return GUA_SYMBOL_MAP[guaName] || '☯';
    }

    function loadHistoryList() {
      const container = document.getElementById('historyListContainer');
      const emptyEl = document.getElementById('historyEmpty');
      const detailContainer = document.getElementById('historyDetailContainer');
      const history = getHistory();

      if (detailContainer) detailContainer.classList.add('hidden');
      if (container) container.style.display = '';
      if (emptyEl) emptyEl.style.display = 'block';

      if (history.length === 0) {
        if (container) container.innerHTML = '';
        if (emptyEl) emptyEl.classList.remove('hidden');
        return;
      }

      if (emptyEl) emptyEl.classList.add('hidden');
      if (!container) return;

      // ===== 统计摘要 =====
      let totalCount = history.length;
      let scenarioCounts = {};
      let guaCounts = {};
      let dates = [];
      history.forEach(item => {
        const sc = item.scenario || 'general';
        scenarioCounts[sc] = (scenarioCounts[sc] || 0) + 1;
        const gn = item.benGuaName || '';
        if (gn) guaCounts[gn] = (guaCounts[gn] || 0) + 1;
        if (item.date) {
          const d = new Date(item.date);
          if (!isNaN(d.getTime())) dates.push(d.toISOString().slice(0, 10));
        }
      });
      let topScenario = '';
      let topScenarioCount = 0;
      for (let k in scenarioCounts) {
        if (scenarioCounts[k] > topScenarioCount) {
          topScenarioCount = scenarioCounts[k];
          topScenario = k;
        }
      }
      const scenarioNameMap = {love:'感情',career:'事业',wealth:'财运',study:'学业',health:'健康',lost:'失物',general:'通用',travel:'出行'};
      const topScenarioName = scenarioNameMap[topScenario] || topScenario || '通用';
      let topGua = '';
      let topGuaCount = 0;
      for (let k in guaCounts) {
        if (guaCounts[k] > topGuaCount) {
          topGuaCount = guaCounts[k];
          topGua = k;
        }
      }
      let uniqueDates = [...new Set(dates)].sort().reverse();
      let streak = 0;
      if (uniqueDates.length > 0) {
        const today = new Date();
        const todayStr = today.toISOString().slice(0, 10);
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toISOString().slice(0, 10);
        let checkDate = new Date(uniqueDates[0]);
        if (uniqueDates[0] === todayStr || uniqueDates[0] === yesterdayStr) {
          for (let d = 0; d < uniqueDates.length; d++) {
            const expected = new Date(checkDate);
            expected.setDate(expected.getDate() - d);
            const expectedStr = expected.toISOString().slice(0, 10);
            if (uniqueDates[d] === expectedStr) {
              streak++;
            } else {
              break;
            }
          }
        }
      }

      let summaryHtml = '<div style="padding:0 0.75rem 0.75rem;margin-bottom:0.5rem;">';
      summaryHtml += '<div style="display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;font-size:0.7rem;color:var(--text-tertiary);">';
      summaryHtml += '<span>已起 <strong style="color:var(--text-secondary);">' + totalCount + '</strong> 卦</span>';
      if (topScenarioName) summaryHtml += '<span style="opacity:0.3;">·</span><span>问' + topScenarioName + '最多</span>';
      if (topGua) summaryHtml += '<span style="opacity:0.3;">·</span><span>' + topGua + '最多</span>';
      if (streak > 1) summaryHtml += '<span style="opacity:0.3;">·</span><span>连续 <strong style="color:var(--accent);">' + streak + '</strong> 天</span>';
      summaryHtml += '</div>';
      summaryHtml += '</div>';

      let html = summaryHtml;
      history.forEach(item => {
        const safeId = String(item.id).replace(/'/g, "\\'");
        let rawQ = (item.question || '').trim();
        let shortQ = rawQ.replace(/^(今年|最近|今天|这个月|下周|明天|刚才|刚刚|我朋友|我同事|我|我们|朋友|同事|她|他)/, '').trim();
        if (shortQ.length < 2) shortQ = rawQ;
        const idx = shortQ.indexOf('什么');
        if (idx !== -1) { shortQ = shortQ.slice(idx + 2).replace(/^(时候|地方|情况|原因|方式)/, ''); }
        shortQ = shortQ.replace(/[吗呢了啊]$/, '').slice(0, 4);
        if (shortQ.length < 2) shortQ = rawQ.replace(/[吗呢了啊]$/, '').slice(0, 4);
        const rot = ((item.id % 9) - 4) * 1.5;
        const yOff = ((item.id % 7) - 3) * 2;
        html += `
          <div class="history-stick" onclick="viewHistoryDetail('${safeId}')" style="transform: rotate(${rot}deg) translateY(${yOff}px);">
            <div class="stick-body">
              <span class="stick-question">${escapeHtml(shortQ)}</span>
              <span class="stick-seal" style="font-size:1.1rem;font-weight:bold;">${getGuaSymbol(item.benGuaName || '')}</span>
            </div>
            <span class="stick-date">${escapeHtml((item.date || '').slice(5, 10))}</span>
            <button class="stick-delete" onclick="event.stopPropagation(); deleteHistoryItem('${safeId}')">✕</button>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function deleteHistoryItem(id) {
      if (confirm('确定删除这条记录吗？')) {
        let history = getHistory();
        let deletedItem = history.find(item => String(item.id) === String(id));
        history = history.filter(item => String(item.id) !== String(id));
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        // 检查图鉴：该卦是否还有其他记录
        if (deletedItem && deletedItem.benGuaName) {
          let stillExists = history.some(function(h) { return h.benGuaName === deletedItem.benGuaName; });
          if (!stillExists) {
            let colData = getCollectionData();
            let idx = colData.unlockedGua.indexOf(deletedItem.benGuaName);
            if (idx !== -1) {
              colData.unlockedGua.splice(idx, 1);
              saveCollectionData(colData);
            }
          }
        }
        loadHistoryList();
        showToast('记录已删除');
      }
    }

    function clearAllHistory() {
      if (confirm('确定清空所有历史记录吗？此操作不可恢复。')) {
        localStorage.removeItem(HISTORY_KEY);
        loadHistoryList();
        showToast('历史记录已清空');
      }
    }

    function viewHistoryDetail(id) {
      const history = getHistory();
      const record = history.find(item => String(item.id) === String(id));
      if (!record) return;
      if (!record.interpretation) { showToast('记录数据异常'); return; }

      const listContainer = document.getElementById('historyListContainer');
      const emptyEl = document.getElementById('historyEmpty');
      const detailContainer = document.getElementById('historyDetailContainer');
      if (listContainer) listContainer.style.display = 'none';
      if (emptyEl) emptyEl.style.display = 'none';
      if (detailContainer) {
        detailContainer.classList.remove('hidden');
        detailContainer.innerHTML = '';
      } else { return; }

      const interp = record.interpretation;
      const meta = interp.meta || {};
      const lines = interp.lines || {};
      const content = interp.content || {};

      const card = document.createElement('div');
      card.className = 'glass-card p-6 animate-in';
      card.innerHTML = `
        <button onclick="backToHistoryList()" class="btn-secondary py-2 px-4 text-sm mb-4">← 返回记录列表</button>
        <h2 class="text-xl font-bold mb-3" style="color: var(--accent);">${escapeHtml(meta.benGuaName || '未知')}</h2>
        <p class="text-sm mb-4" style="color: var(--text-secondary);">${escapeHtml(meta.question || '')}</p>
        <div class="insight-block mb-3"><h4>核心结论</h4><p>${escapeHtml(lines.mainLine || '')}</p></div>
        <div class="insight-block mb-3"><h4>行动建议</h4><p>${escapeHtml(content.action || '')}</p></div>
        <button onclick="showFullHistoryDetail('${id}')" class="btn-primary w-full py-3 mt-4 text-sm">查看完整解读</button>
        <div id="historyFullArea"></div>
      `;
      detailContainer.appendChild(card);
    }

    function backToHistoryList() {
      const listContainer = document.getElementById('historyListContainer');
      const emptyEl = document.getElementById('historyEmpty');
      const detailContainer = document.getElementById('historyDetailContainer');
      if (listContainer) listContainer.style.display = '';
      if (emptyEl) emptyEl.style.display = 'block';
      if (detailContainer) detailContainer.classList.add('hidden');
      loadHistoryList();
    }

    function showFullHistoryDetail(id) {
      const history = getHistory();
      const record = history.find(item => String(item.id) === String(id));
      if (!record) return;

      const fullArea = document.getElementById('historyFullArea');
      if (!fullArea) return;
      fullArea.innerHTML = '';

      const meta = record.interpretation.meta || {};
      const fakeResult = {
        ti: { ele: meta.tiEle || '金', name: meta.tiName || '体卦', sym: '', yao: [] },
        yong: { ele: meta.yongEle || '土', name: meta.yongName || '用卦', sym: '', yao: [] },
        benGuaName: meta.benGuaName || '',
        bianGuaName: meta.bianGuaName || '',
        huGuaName: meta.huGuaName || meta.benGuaName || '',
        moveYao: meta.moveYao || 1,
        benSym: '',
        bianSym: '',
        huSym: '',
        hu: { shang: { name: '', ele: '' }, xia: { name: '', ele: '' } }
      };

      try {
        const resultArea = document.createElement('div');
        fullArea.appendChild(resultArea);
        if (!record.interpretation || !record.interpretation.meta) {
          throw new Error('解读数据不完整');
        }
        renderResult(record.interpretation, fakeResult, resultArea);
      } catch(err) {
        console.error('完整解读渲染出错:', err);
        fullArea.innerHTML = '<div class="glass-card p-4 text-center" style="color: var(--error);">解读加载失败，请重试</div>';
      }
    }

    // ===================== 加载动画 =====================
    function showLoading() {
      const mask = document.getElementById('loadingMask');
      const bar = document.getElementById('progressBar');
      const progressTrack = mask ? mask.querySelector('.progress-track') : null;
      const stageEl = document.getElementById('loadingStage');
      const subtextEl = document.getElementById('loadingSubtext');
      const loadingGua = document.getElementById('loadingGua');
      const step1 = document.getElementById('loadingStep1');
      const step2 = document.getElementById('loadingStep2');
      const step3 = document.getElementById('loadingStep3');
      const step4 = document.getElementById('loadingStep4');

      if (mask) mask.classList.add('active');
      if (bar) bar.style.width = '0%';
      if (progressTrack) progressTrack.setAttribute('aria-valuenow', '0');

      const stages = [
        { stage: '起局中...', subtext: '正在收拢这次问题里的关键气口', step: 1 },
        { stage: '校势中...', subtext: '正在定位当前关系的核心张力', step: 2 },
        { stage: '推演中...', subtext: '正在模拟关系发展的多种可能', step: 3 },
        { stage: '收束中...', subtext: '正在整合为最终的判断输出', step: 4 }
      ];
      const guaSymbols = ['☰', '☱', '☲', '☳', '☴', '☵', '☶', '☷'];
      let progress = 0;
      let stageIdx = 0;
      let symbolIdx = 0;

      const steps = [step1, step2, step3, step4];

      function updateSteps(activeStep) {
        steps.forEach((step, i) => {
          if (!step) return;
          if (i + 1 === activeStep) {
            step.classList.add('is-active');
          } else if (i + 1 < activeStep) {
            step.classList.remove('is-active');
            step.style.opacity = '0.5';
          } else {
            step.classList.remove('is-active');
            step.style.opacity = '1';
          }
        });
      }

      const timer = setInterval(() => {
        progress += 2;
        const clampedProgress = Math.min(progress, 95);
        if (bar) bar.style.width = clampedProgress + '%';
        if (progressTrack) progressTrack.setAttribute('aria-valuenow', String(clampedProgress));

        const newStageIdx = Math.min(Math.floor(progress / 25), stages.length - 1);
        if (newStageIdx !== stageIdx) {
          stageIdx = newStageIdx;
          const current = stages[stageIdx];
          if (stageEl) stageEl.textContent = current.stage;
          if (subtextEl) subtextEl.textContent = current.subtext;
          updateSteps(current.step);
        }

        if (progress % 30 === 0) {
          symbolIdx = (symbolIdx + 1) % guaSymbols.length;
          if (loadingGua) {
            loadingGua.style.opacity = '0';
            requestAnimationFrame(() => {
              loadingGua.textContent = guaSymbols[symbolIdx];
              loadingGua.style.opacity = '1';
            });
          }
        }

        if (progress >= 100) clearInterval(timer);
      }, 40);

      return timer;
    }

    function hideLoading(timer) {
      if (!timer) return;
      clearInterval(timer);
      const mask = document.getElementById('loadingMask');
      const bar = document.getElementById('progressBar');
      const progressTrack = mask ? mask.querySelector('.progress-track') : null;
